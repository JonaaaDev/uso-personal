<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Diseño Raylib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo oscuro para no cansar la vista, como los editores de código profesionales */
        body {
            background-color: #181818;
            color: #eeeeee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            background-color: #2c2c2c;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: auto;
            border: 2px solid #444;
        }
        .ray-element {
            position: absolute;
            cursor: move;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed transparent;
            box-sizing: border-box;
        }
        .ray-element:hover {
            border-color: #00ff00;
        }
        .ray-element.selected {
            border: 2px solid #00bbff !important;
            z-index: 100;
        }
        /* Líneas de guía para saber dónde está el centro exacto */
        .guide {
            position: absolute;
            background-color: rgba(0, 255, 255, 0.5);
            pointer-events: none;
            display: none;
        }
        .guide-h { width: 100%; height: 1px; }
        .guide-v { width: 1px; height: 100%; }

        .info-panel {
            background: #252525;
            border-left: 1px solid #444;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            opacity: 1;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Configuración de la ventana de Raylib -->
    <header class="p-4 bg-[#202020] border-b border-[#333] flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-400">Raylib Design Studio</h1>
            <div class="flex gap-2 items-center text-sm">
                <label>Ancho:</label>
                <input type="number" id="screen-w" value="800" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 w-20">
                <label>Alto:</label>
                <input type="number" id="screen-h" value="450" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 w-20">
                <button onclick="updateScreenSize()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded transition text-xs font-bold">REESCALAR PANTALLA</button>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="addElement('text')" class="bg-green-700 hover:bg-green-600 px-3 py-1 rounded text-sm">+ Texto</button>
            <button onclick="addElement('rect')" class="bg-orange-700 hover:bg-orange-600 px-3 py-1 rounded text-sm">+ Rectángulo</button>
            <button onclick="addElement('circle')" class="bg-purple-700 hover:bg-purple-600 px-3 py-1 rounded text-sm">+ Círculo</button>
            <button onclick="clearCanvas()" class="bg-red-700 hover:bg-red-600 px-3 py-1 rounded text-sm">Limpiar Todo</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- El Lienzo (Donde ocurre la magia) -->
        <div class="flex-1 overflow-auto p-10 flex items-center justify-center bg-[#121212]">
            <div id="canvas-container">
                <div id="guide-x" class="guide guide-v"></div>
                <div id="guide-y" class="guide guide-h"></div>
            </div>
        </div>

        <!-- Panel lateral para control total -->
        <aside class="w-80 info-panel p-4 flex flex-col gap-4 overflow-y-auto">
            <h2 class="font-bold border-b border-gray-600 pb-2 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.185 1.184l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.184 1.185l-.292-.159a1.873 1.873 0 0 0-2.692 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.693-1.115l-.291.16c-.764.415-1.6-.42-1.185-1.184l.159-.292a1.873 1.873 0 0 0-1.116-2.692l-.318-.094c-.835-.246-.835-1.428 0-1.674l.319-.094a1.873 1.873 0 0 0 1.115-2.693l-.16-.291c-.415-.764.42-1.6 1.184-1.185l.292.159a1.873 1.873 0 0 0 2.692-1.116l.094-.318z"/></svg>
                Propiedades Manuales
            </h2>
            
            <div id="properties-content" class="text-sm space-y-4">
                <p class="text-gray-400 italic">Haz clic en un objeto de la pantalla para editarlo...</p>
            </div>
            
            <div class="mt-auto p-4 bg-black rounded border border-gray-800">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-2 tracking-widest">Código para C++</h3>
                <pre id="code-output" class="text-[11px] text-green-400 whitespace-pre-wrap font-mono"></pre>
            </div>
        </aside>
    </main>

    <script>
        // Variables globales para el estado de la aplicación
        let canvas = document.getElementById('canvas-container');
        let selectedElement = null;
        let isDragging = false;
        let offset = { x: 0, y: 0 };
        const SNAP_THRESHOLD = 15; // Sensibilidad del imán de centrado

        // Ajusta el tamaño de la ventana simulada
        function updateScreenSize() {
            const w = document.getElementById('screen-w').value;
            const h = document.getElementById('screen-h').value;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            
            // Actualizar líneas de guía
            document.getElementById('guide-x').style.left = (w / 2) + 'px';
            document.getElementById('guide-y').style.top = (h / 2) + 'px';
            
            clearProperties();
        }

        // Añade un nuevo elemento (Texto, Rectángulo o Círculo)
        function addElement(type) {
            const el = document.createElement('div');
            el.className = 'ray-element';
            el.dataset.type = type;
            
            if (type === 'text') {
                el.innerText = "Nuevo Texto";
                el.style.color = "#ffffff";
                el.style.fontSize = "24px";
                el.style.fontWeight = "bold";
            } else if (type === 'rect') {
                el.style.backgroundColor = "rgba(255, 120, 0, 0.8)";
                el.style.width = "120px";
                el.style.height = "80px";
            } else if (type === 'circle') {
                el.style.backgroundColor = "rgba(180, 50, 255, 0.8)";
                el.style.width = "100px";
                el.style.height = "100px";
                el.style.borderRadius = "50%";
            }

            // Posición inicial por defecto
            el.style.left = '100px';
            el.style.top = '100px';

            el.addEventListener('mousedown', startDrag);
            canvas.appendChild(el);
            selectElement(el);
        }

        // Gestión del arrastre con el ratón
        function startDrag(e) {
            e.stopPropagation();
            selectElement(this);
            isDragging = true;
            
            const rect = this.getBoundingClientRect();
            offset.x = e.clientX - rect.left;
            offset.y = e.clientY - rect.top;

            window.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', stopDrag);
        }

        function drag(e) {
            if (!isDragging || !selectedElement) return;

            const canvasRect = canvas.getBoundingClientRect();
            let newX = e.clientX - canvasRect.left - offset.x;
            let newY = e.clientY - canvasRect.top - offset.y;

            // Lógica de centrado automático (Imán)
            const centerX = canvas.offsetWidth / 2;
            const centerY = canvas.offsetHeight / 2;
            const elW = selectedElement.offsetWidth;
            const elH = selectedElement.offsetHeight;

            let snappedX = false;
            let snappedY = false;

            if (Math.abs((newX + elW / 2) - centerX) < SNAP_THRESHOLD) {
                newX = centerX - (elW / 2);
                snappedX = true;
            }
            if (Math.abs((newY + elH / 2) - centerY) < SNAP_THRESHOLD) {
                newY = centerY - (elH / 2);
                snappedY = true;
            }

            document.getElementById('guide-x').style.display = snappedX ? 'block' : 'none';
            document.getElementById('guide-y').style.display = snappedY ? 'block' : 'none';

            selectedElement.style.left = newX + 'px';
            selectedElement.style.top = newY + 'px';

            updatePropertiesUI();
        }

        function stopDrag() {
            isDragging = false;
            document.getElementById('guide-x').style.display = 'none';
            document.getElementById('guide-y').style.display = 'none';
            window.removeEventListener('mousemove', drag);
            window.removeEventListener('mouseup', stopDrag);
        }

        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('selected');
            selectedElement = el;
            selectedElement.classList.add('selected');
            updatePropertiesUI();
        }

        // Actualiza los campos del panel lateral
        function updatePropertiesUI() {
            if (!selectedElement) return;

            const type = selectedElement.dataset.type;
            const x = parseInt(selectedElement.style.left);
            const y = parseInt(selectedElement.style.top);
            const w = selectedElement.offsetWidth;
            const h = selectedElement.offsetHeight;

            let extraControl = "";
            if (type === 'text') {
                extraControl = `
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Contenido del Texto</label>
                        <input type="text" value="${selectedElement.innerText}" oninput="manualUpdate('text', this.value)" class="w-full bg-gray-800 border border-gray-700 p-2 rounded mt-1 outline-none focus:border-blue-500">
                    </div>
                `;
            }

            document.getElementById('properties-content').innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Posición X</label>
                        <input type="number" value="${x}" oninput="manualUpdate('x', this.value)" class="w-full bg-gray-800 border border-gray-700 p-2 rounded mt-1 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Posición Y</label>
                        <input type="number" value="${y}" oninput="manualUpdate('y', this.value)" class="w-full bg-gray-800 border border-gray-700 p-2 rounded mt-1 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Ancho (px)</label>
                        <input type="number" value="${w}" oninput="manualUpdate('w', this.value)" class="w-full bg-gray-800 border border-gray-700 p-2 rounded mt-1 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Alto (px)</label>
                        <input type="number" value="${h}" oninput="manualUpdate('h', this.value)" class="w-full bg-gray-800 border border-gray-700 p-2 rounded mt-1 outline-none focus:border-blue-500">
                    </div>
                </div>
                ${extraControl}
            `;
            
            generateCode(type, x, y, w, h);
        }

        // Permite la edición manual desde los inputs
        function manualUpdate(prop, val) {
            if (!selectedElement) return;
            
            if (prop === 'x') selectedElement.style.left = val + 'px';
            if (prop === 'y') selectedElement.style.top = val + 'px';
            if (prop === 'w') {
                selectedElement.style.width = val + 'px';
                if (selectedElement.dataset.type === 'circle') selectedElement.style.height = val + 'px';
            }
            if (prop === 'h') {
                selectedElement.style.height = val + 'px';
                if (selectedElement.dataset.type === 'circle') selectedElement.style.width = val + 'px';
            }
            if (prop === 'text') selectedElement.innerText = val;

            // Al actualizar manualmente, regeneramos el código
            const x = parseInt(selectedElement.style.left);
            const y = parseInt(selectedElement.style.top);
            const w = selectedElement.offsetWidth;
            const h = selectedElement.offsetHeight;
            generateCode(selectedElement.dataset.type, x, y, w, h);
        }

        function generateCode(type, x, y, w, h) {
            let code = "";
            if (type === 'text') {
                const txt = selectedElement.innerText;
                code = `// Dibuja el texto en la pantalla\nDrawText("${txt}", ${x}, ${y}, 24, WHITE);`;
            } else if (type === 'rect') {
                code = `// Dibuja un rectángulo relleno\nDrawRectangle(${x}, ${y}, ${w}, ${h}, ORANGE);`;
            } else if (type === 'circle') {
                // En Raylib, el círculo se dibuja desde el CENTRO
                const radius = w / 2;
                const centerX = x + radius;
                const centerY = y + radius;
                code = `// OJO: Raylib usa el CENTRO del círculo\nDrawCircle(${centerX}, ${centerY}, ${radius}, PURPLE);`;
            }
            document.getElementById('code-output').innerText = code;
        }

        function clearCanvas() {
            const elements = canvas.querySelectorAll('.ray-element');
            elements.forEach(el => el.remove());
            clearProperties();
        }

        function clearProperties() {
            selectedElement = null;
            document.getElementById('properties-content').innerHTML = '<p class="text-gray-400 italic">Haz clic en un objeto para editarlo...</p>';
            document.getElementById('code-output').innerText = "";
        }

        // Inicialización
        updateScreenSize();

    </script>
</body>
</html>
