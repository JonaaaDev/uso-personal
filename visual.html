<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Diseño Raylib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo inspirado en la estética oscura de las herramientas de desarrollo */
        body {
            background-color: #181818;
            color: #eeeeee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            background-color: #2c2c2c;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: auto;
            border: 2px solid #444;
        }
        .ray-element {
            position: absolute;
            cursor: move;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed transparent;
        }
        .ray-element:hover {
            border-color: #00ff00;
        }
        .ray-element.selected {
            border: 2px solid #00bbff !important;
            z-index: 100;
        }
        /* Líneas de guía para el centrado */
        .guide {
            position: absolute;
            background-color: rgba(0, 255, 255, 0.5);
            pointer-events: none;
            display: none;
        }
        .guide-h { width: 100%; height: 1px; }
        .guide-v { width: 1px; height: 100%; }

        .info-panel {
            background: #252525;
            border-left: 1px solid #444;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Encabezado de Configuración Inicial -->
    <header class="p-4 bg-[#202020] border-b border-[#333] flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-400">Raylib Design Studio</h1>
            <div class="flex gap-2 items-center text-sm">
                <label>Ancho:</label>
                <input type="number" id="screen-w" value="800" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 w-20">
                <label>Alto:</label>
                <input type="number" id="screen-h" value="450" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 w-20">
                <button onclick="updateScreenSize()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded transition">Aplicar Pantalla</button>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="addElement('text')" class="bg-green-700 hover:bg-green-600 px-3 py-1 rounded text-sm">+ Texto</button>
            <button onclick="addElement('rect')" class="bg-orange-700 hover:bg-orange-600 px-3 py-1 rounded text-sm">+ Rect</button>
            <button onclick="addElement('circle')" class="bg-purple-700 hover:bg-purple-600 px-3 py-1 rounded text-sm">+ Círculo</button>
            <button onclick="clearCanvas()" class="bg-red-700 hover:bg-red-600 px-3 py-1 rounded text-sm">Limpiar</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Área de Trabajo (La Pantalla de Raylib) -->
        <div class="flex-1 overflow-auto p-10 flex items-center justify-center bg-[#121212]">
            <div id="canvas-container">
                <!-- Guías de centrado -->
                <div id="guide-x" class="guide guide-v"></div>
                <div id="guide-y" class="guide guide-h"></div>
            </div>
        </div>

        <!-- Panel de Propiedades -->
        <aside class="w-80 info-panel p-4 flex flex-col gap-4">
            <h2 class="font-bold border-b border-gray-600 pb-2">Propiedades del Elemento</h2>
            <div id="properties-content" class="text-sm space-y-3">
                <p class="text-gray-400 italic">Selecciona un elemento para ver sus datos de Raylib...</p>
            </div>
            
            <div class="mt-auto p-3 bg-black rounded border border-gray-800">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-2">Código Sugerido</h3>
                <pre id="code-output" class="text-[10px] text-green-400 whitespace-pre-wrap"></pre>
            </div>
        </aside>
    </main>

    <script>
        // --- Lógica del Simulador ---
        
        let canvas = document.getElementById('canvas-container');
        let selectedElement = null;
        let isDragging = false;
        let offset = { x: 0, y: 0 };
        const SNAP_THRESHOLD = 10; // Distancia para imán de centrado

        function updateScreenSize() {
            // Obtener valores de los inputs
            const w = document.getElementById('screen-w').value;
            const h = document.getElementById('screen-h').value;
            
            // Aplicar tamaño al contenedor que simula la ventana de Raylib
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            
            // Posicionar guías en el centro exacto
            document.getElementById('guide-x').style.left = (w / 2) + 'px';
            document.getElementById('guide-y').style.top = (h / 2) + 'px';
            
            clearProperties();
        }

        function addElement(type) {
            const el = document.createElement('div');
            el.className = 'ray-element';
            el.dataset.type = type;
            
            // Valores iniciales
            let x = 50, y = 50, w = 100, h = 50;

            if (type === 'text') {
                el.innerText = "Hola Raylib";
                el.style.color = "#ffffff";
                el.style.fontSize = "20px";
                el.style.fontWeight = "bold";
            } else if (type === 'rect') {
                el.style.backgroundColor = "rgba(255, 100, 0, 0.7)";
                el.style.width = "100px";
                el.style.height = "60px";
            } else if (type === 'circle') {
                el.style.backgroundColor = "rgba(150, 0, 255, 0.7)";
                el.style.width = "80px";
                el.style.height = "80px";
                el.style.borderRadius = "50%";
            }

            el.style.left = x + 'px';
            el.style.top = y + 'px';

            // Eventos de ratón para el arrastre
            el.addEventListener('mousedown', startDrag);
            canvas.appendChild(el);
            selectElement(el);
        }

        function startDrag(e) {
            e.stopPropagation();
            selectElement(this);
            isDragging = true;
            
            // Calculamos la distancia entre el ratón y la esquina del objeto
            const rect = this.getBoundingClientRect();
            offset.x = e.clientX - rect.left;
            offset.y = e.clientY - rect.top;

            window.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', stopDrag);
        }

        function drag(e) {
            if (!isDragging || !selectedElement) return;

            const canvasRect = canvas.getBoundingClientRect();
            let newX = e.clientX - canvasRect.left - offset.x;
            let newY = e.clientY - canvasRect.top - offset.y;

            // --- Lógica de Centrado (Snapping) ---
            const centerX = canvas.offsetWidth / 2;
            const centerY = canvas.offsetHeight / 2;
            const elW = selectedElement.offsetWidth;
            const elH = selectedElement.offsetHeight;

            let snappedX = false;
            let snappedY = false;

            // Snap Horizontal (Centro del elemento con centro de pantalla)
            if (Math.abs((newX + elW / 2) - centerX) < SNAP_THRESHOLD) {
                newX = centerX - (elW / 2);
                snappedX = true;
            }
            
            // Snap Vertical
            if (Math.abs((newY + elH / 2) - centerY) < SNAP_THRESHOLD) {
                newY = centerY - (elH / 2);
                snappedY = true;
            }

            // Mostrar u ocultar líneas guía
            document.getElementById('guide-x').style.display = snappedX ? 'block' : 'none';
            document.getElementById('guide-y').style.display = snappedY ? 'block' : 'none';

            // Limitar dentro de la pantalla (opcional, como en Raylib)
            selectedElement.style.left = newX + 'px';
            selectedElement.style.top = newY + 'px';

            updateProperties();
        }

        function stopDrag() {
            isDragging = false;
            document.getElementById('guide-x').style.display = 'none';
            document.getElementById('guide-y').style.display = 'none';
            window.removeEventListener('mousemove', drag);
            window.removeEventListener('mouseup', stopDrag);
        }

        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('selected');
            selectedElement = el;
            selectedElement.classList.add('selected');
            updateProperties();
        }

        function updateProperties() {
            if (!selectedElement) return;

            const type = selectedElement.dataset.type;
            const x = parseInt(selectedElement.style.left);
            const y = parseInt(selectedElement.style.top);
            const w = selectedElement.offsetWidth;
            const h = selectedElement.offsetHeight;

            let html = `
                <div class="flex justify-between"><span>Tipo:</span> <span class="text-blue-300 font-mono">${type.toUpperCase()}</span></div>
                <div class="flex justify-between"><span>Posición X:</span> <span class="text-yellow-400 font-mono">${x}</span></div>
                <div class="flex justify-between"><span>Posición Y:</span> <span class="text-yellow-400 font-mono">${y}</span></div>
                <div class="flex justify-between"><span>Ancho (W):</span> <span class="text-yellow-400 font-mono">${w}</span></div>
                <div class="flex justify-between"><span>Alto (H):</span> <span class="text-yellow-400 font-mono">${h}</span></div>
            `;

            if (type === 'text') {
                html += `<div class="mt-4">
                    <label class="block mb-1 text-xs">Editar Texto:</label>
                    <input type="text" value="${selectedElement.innerText}" oninput="changeText(this.value)" class="w-full bg-gray-700 p-1 rounded">
                </div>`;
            }

            document.getElementById('properties-content').innerHTML = html;
            generateCode(type, x, y, w, h);
        }

        function changeText(val) {
            if (selectedElement && selectedElement.dataset.type === 'text') {
                selectedElement.innerText = val;
                updateProperties();
            }
        }

        function generateCode(type, x, y, w, h) {
            let code = "";
            if (type === 'text') {
                const txt = selectedElement.innerText;
                code = `// Cuidado: DrawText usa la esquina superior izquierda\nDrawText("${txt}", ${x}, ${y}, 20, WHITE);`;
            } else if (type === 'rect') {
                code = `// Recuerda que X e Y definen dónde empieza el rectángulo\nDrawRectangle(${x}, ${y}, ${w}, ${h}, ORANGE);`;
            } else if (type === 'circle') {
                const radius = w / 2;
                const centerX = x + radius;
                const centerY = y + radius;
                code = `// ¡Ojo! DrawCircle en Raylib usa el CENTRO, no la esquina\nDrawCircle(${centerX}, ${centerY}, ${radius}, PURPLE);`;
            }
            document.getElementById('code-output').innerText = code;
        }

        function clearCanvas() {
            const elements = canvas.querySelectorAll('.ray-element');
            elements.forEach(el => el.remove());
            clearProperties();
        }

        function clearProperties() {
            selectedElement = null;
            document.getElementById('properties-content').innerHTML = '<p class="text-gray-400 italic">Selecciona un elemento para ver sus datos...</p>';
            document.getElementById('code-output').innerText = "";
        }

        // Inicializar tamaño
        updateScreenSize();

    </script>
</body>
</html>
