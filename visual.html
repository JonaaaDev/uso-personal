<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raylib Multi-Studio Pro - Memoria y Capas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            background-color: #000;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .ray-element {
            position: absolute;
            cursor: move;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: 1px solid transparent;
            white-space: nowrap;
        }
        .ray-element:hover { outline: 1px solid #555; }
        .ray-element.selected { outline: 1px solid #3b82f6 !important; z-index: 50; }
        
        /* Prioridad de capas: El texto siempre arriba */
        .ray-text-container { z-index: 100 !important; }

        .guide { 
            position: absolute; 
            background-color: #3b82f6; 
            pointer-events: none; 
            display: none; 
            z-index: 200; 
            box-shadow: 0 0 4px rgba(59, 130, 246, 0.5);
        }
        .guide-h { width: 100%; height: 1px; }
        .guide-v { width: 1px; height: 100%; }

        .ray-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: white;
            background: #1a1a1a;
        }
        
        .ray-text-container {
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            background-color: rgba(59, 130, 246, 0.15);
            padding: 0;
            margin: 0;
        }
        .ray-text-content {
            display: block;
            line-height: 1;
            padding: 0;
            margin: 0;
            font-family: monospace;
            transform: scaleY(1.1);
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 bg-[#161616] border-b border-[#222] flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold text-white flex items-center gap-2">
                <span class="bg-blue-600 px-1.5 rounded text-sm">R</span> Multi-Studio
            </h1>
            <div id="project-tabs" class="flex h-full items-center overflow-x-auto gap-1 max-w-xl"></div>
            <button onclick="createNewWindow()" class="p-1.5 hover:bg-zinc-800 rounded text-blue-400" title="Nueva Ventana">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>

        <div class="flex gap-2 bg-zinc-900 p-1 rounded-md border border-zinc-800">
            <button onclick="addElement('text')" class="px-3 py-1 hover:bg-zinc-800 rounded text-xs font-bold text-blue-400">TEXTO</button>
            <button onclick="addElement('rect')" class="px-3 py-1 hover:bg-zinc-800 rounded text-xs font-bold text-orange-400">RECT</button>
            <button onclick="addElement('circle')" class="px-3 py-1 hover:bg-zinc-800 rounded text-xs font-bold text-purple-400">CIRCL</button>
            <button onclick="addElement('triangle')" class="px-3 py-1 hover:bg-zinc-800 rounded text-xs font-bold text-emerald-400">TRIANG</button>
        </div>

        <div class="flex gap-2">
            <button onclick="resetStorage()" class="px-4 py-1.5 bg-red-900/20 hover:bg-red-900/40 text-red-500 rounded text-xs font-bold transition-all border border-red-900/30">LIMPIAR TODO</button>
            <button onclick="exportCode()" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 rounded text-xs font-bold">EXPORTAR C++</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <div class="flex-1 overflow-auto p-12 flex items-center justify-center bg-[#0a0a0a]">
            <div id="canvas-container">
                <div id="guide-screen-v" class="guide guide-v"></div>
                <div id="guide-screen-h" class="guide guide-h"></div>
                <div id="guide-target-v" class="guide guide-v !bg-yellow-400"></div>
                <div id="guide-target-h" class="guide guide-h !bg-yellow-400"></div>
            </div>
        </div>

        <aside class="w-80 bg-[#161616] border-l border-[#222] flex flex-col">
            <div class="p-4 border-b border-[#222]">
                <h2 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Configuración Ventana</h2>
                <div class="flex flex-col gap-2">
                    <input type="text" id="win-title" oninput="updateWindowTitle(this.value)" class="bg-black border border-zinc-800 rounded px-2 py-1.5 text-sm text-blue-400">
                    <div class="flex gap-2">
                        <input type="number" id="screen-w" oninput="updateScreenSize()" class="bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs w-1/2">
                        <input type="number" id="screen-h" oninput="updateScreenSize()" class="bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs w-1/2">
                    </div>
                </div>
            </div>

            <div id="properties-content" class="p-4 flex-1 overflow-y-auto space-y-4"></div>

            <div class="p-4 border-t border-[#222] bg-[#111] text-[10px] text-zinc-500 flex items-center justify-between">
                <span>Estado: <span class="text-emerald-500 font-bold">Autoguardado</span></span>
                <span id="save-indicator" class="opacity-0 transition-opacity duration-300">Guardado...</span>
            </div>
        </aside>
    </main>

    <div id="export-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[200] p-6">
        <div class="bg-[#111] border border-zinc-800 rounded-xl w-full max-w-4xl flex flex-col max-h-full">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-[#161616]">
                <h3 class="font-bold text-white uppercase text-sm tracking-widest">Código Fuente C++</h3>
                <button onclick="document.getElementById('export-modal').style.display='none'" class="text-zinc-500 hover:text-white text-2xl">&times;</button>
            </div>
            <pre id="full-code-output" class="p-6 overflow-auto text-[11px] font-mono text-emerald-400 bg-black flex-1"></pre>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'RAYLIB_STUDIO_SAVE';
        let windows = [{ id: 'win-1', title: 'NIVEL_1', width: 800, height: 450, elements: [] }];
        let currentWindowId = 'win-1';
        let selectedElementId = null;
        let isDragging = false;
        let offset = { x: 0, y: 0 };
        const canvas = document.getElementById('canvas-container');
        const SNAP_THRESHOLD = 10;
        const RAYLIB_FONT_RATIO = 0.5; 

        window.onload = () => {
            loadFromStorage();
            renderTabs();
            switchWindow(currentWindowId);
        };

        // --- SISTEMA DE PERSISTENCIA ---
        function saveToStorage() {
            const data = {
                windows: windows,
                currentWindowId: currentWindowId
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            const indicator = document.getElementById('save-indicator');
            indicator.style.opacity = '1';
            setTimeout(() => indicator.style.opacity = '0', 1000);
        }

        function loadFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                windows = data.windows;
                currentWindowId = data.currentWindowId;
            }
        }

        function resetStorage() {
            if (confirm("¿Seguro que quieres borrar todo tu trabajo?")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function createNewWindow() {
            const id = 'win-' + Date.now();
            windows.push({ id: id, title: 'ESCENA_NUEVA', width: 800, height: 450, elements: [] });
            saveToStorage();
            renderTabs();
            switchWindow(id);
        }

        function switchWindow(id) {
            currentWindowId = id;
            selectedElementId = null;
            const win = windows.find(w => w.id === id) || windows[0];
            currentWindowId = win.id;
            
            document.getElementById('win-title').value = win.title;
            document.getElementById('screen-w').value = win.width;
            document.getElementById('screen-h').value = win.height;
            updateScreenSize();
            
            canvas.querySelectorAll('.ray-element').forEach(e => e.remove());
            win.elements.forEach(data => drawElementInDOM(data));
            
            renderTabs();
            renderProperties();
            saveToStorage();
        }

        function renderTabs() {
            const container = document.getElementById('project-tabs');
            container.innerHTML = windows.map(win => `
                <div onclick="switchWindow('${win.id}')" class="flex items-center h-full px-4 text-xs font-bold cursor-pointer transition-colors ${win.id === currentWindowId ? 'tab-active' : 'text-zinc-500 hover:text-white'}">
                    <span>${win.title}</span>
                </div>
            `).join('');
        }

        function updateScreenSize() {
            const win = windows.find(w => w.id === currentWindowId);
            win.width = parseInt(document.getElementById('screen-w').value) || 800;
            win.height = parseInt(document.getElementById('screen-h').value) || 450;
            canvas.style.width = win.width + 'px';
            canvas.style.height = win.height + 'px';
            saveToStorage();
        }

        function calculateTextWidth(text, fontSize) {
            return Math.floor(text.length * (fontSize * RAYLIB_FONT_RATIO));
        }

        function addElement(type) {
            const win = windows.find(w => w.id === currentWindowId);
            const data = {
                id: 'el-' + Date.now(),
                type: type,
                x: 50, y: 50,
                w: type === 'text' ? calculateTextWidth("HOLA_RAYLIB", 30) : 100, 
                h: type === 'text' ? 30 : 100,
                color: type === 'text' ? '#3b82f6' : '#ffffff',
                text: "HOLA_RAYLIB"
            };
            win.elements.push(data);
            drawElementInDOM(data);
            selectElement(data.id);
            saveToStorage();
        }

        function drawElementInDOM(data) {
            const el = document.createElement('div');
            el.id = data.id;
            el.className = 'ray-element';
            if (data.type === 'triangle') el.classList.add('ray-triangle');
            if (data.type === 'text') el.classList.add('ray-text-container');
            
            applyElementStyles(el, data);
            
            el.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                selectElement(data.id);
                isDragging = true;
                const rect = el.getBoundingClientRect();
                offset.x = e.clientX - rect.left;
                offset.y = e.clientY - rect.top;
                
                const move = (me) => {
                    if (!isDragging) return;
                    const canvasRect = canvas.getBoundingClientRect();
                    let newX = Math.round(me.clientX - canvasRect.left - offset.x);
                    let newY = Math.round(me.clientY - canvasRect.top - offset.y);
                    
                    const win = windows.find(w => w.id === currentWindowId);
                    hideGuides();

                    // Alineación automática (Snapping)
                    const centerX = win.width / 2 - data.w / 2;
                    const centerY = win.height / 2 - data.h / 2;

                    if (Math.abs(newX - centerX) < SNAP_THRESHOLD) { newX = centerX; showGuide('screen-v', win.width / 2); }
                    if (Math.abs(newY - centerY) < SNAP_THRESHOLD) { newY = centerY; showGuide('screen-h', win.height / 2); }

                    win.elements.forEach(other => {
                        if (other.id === data.id) return;
                        const otherCenterX = other.x + other.w / 2;
                        if (Math.abs((newX + data.w / 2) - otherCenterX) < SNAP_THRESHOLD) {
                            newX = otherCenterX - data.w / 2;
                            showGuide('target-v', otherCenterX);
                        }
                        const otherCenterY = other.y + other.h / 2;
                        if (Math.abs((newY + data.h / 2) - otherCenterY) < SNAP_THRESHOLD) {
                            newY = otherCenterY - data.h / 2;
                            showGuide('target-h', otherCenterY);
                        }
                    });

                    data.x = newX;
                    data.y = newY;
                    applyElementStyles(el, data);
                    syncPropertiesInputs(data);
                };

                const up = () => { 
                    isDragging = false; 
                    hideGuides();
                    saveToStorage();
                    window.removeEventListener('mousemove', move); 
                    window.removeEventListener('mouseup', up); 
                };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
            });
            canvas.appendChild(el);
        }

        function showGuide(id, pos) {
            const g = document.getElementById('guide-' + id);
            if (!g) return;
            g.style.display = 'block';
            if (id.includes('-v')) g.style.left = pos + 'px';
            else g.style.top = pos + 'px';
        }

        function hideGuides() {
            document.querySelectorAll('.guide').forEach(g => g.style.display = 'none');
        }

        function applyElementStyles(el, data) {
            if (data.type === 'text') data.w = calculateTextWidth(data.text, data.h);
            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
            el.style.width = data.w + 'px';
            el.style.height = data.h + 'px';
            el.style.backgroundColor = data.type === 'text' ? 'rgba(59, 130, 246, 0.15)' : data.color;
            el.style.color = data.color;
            el.style.borderRadius = data.type === 'circle' ? '50%' : '0';
            if (data.type === 'text') {
                el.innerHTML = `<span class="ray-text-content" style="font-size: ${data.h}px;">${data.text}</span>`;
            } else {
                el.innerHTML = '';
            }
        }

        function selectElement(id) {
            if (selectedElementId) {
                const prev = document.getElementById(selectedElementId);
                if (prev) prev.classList.remove('selected');
            }
            selectedElementId = id;
            document.getElementById(id).classList.add('selected');
            renderProperties();
        }

        function renderProperties() {
            const container = document.getElementById('properties-content');
            const win = windows.find(w => w.id === currentWindowId);
            const data = win.elements.find(e => e.id === selectedElementId);
            if (!data) { container.innerHTML = '<div class="text-center py-10 text-zinc-600 text-[10px] uppercase font-bold italic">Selecciona para configurar</div>'; return; }

            container.innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[9px] text-zinc-500 font-black uppercase">Posicion X</label><input type="number" id="in-x" value="${data.x}" oninput="updateData('x', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs outline-none focus:border-blue-600"></div>
                        <div><label class="text-[9px] text-zinc-500 font-black uppercase">Posicion Y</label><input type="number" id="in-y" value="${data.y}" oninput="updateData('y', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs outline-none focus:border-blue-600"></div>
                        <div><label class="text-[9px] text-zinc-500 font-black uppercase">Ancho</label><input type="number" id="in-w" value="${data.w}" ${data.type === 'text' ? 'disabled' : ''} oninput="updateData('w', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs disabled:opacity-30"></div>
                        <div><label class="text-[9px] text-zinc-500 font-black uppercase">Alto / Letra</label><input type="number" id="in-h" value="${data.h}" oninput="updateData('h', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs outline-none focus:border-blue-600"></div>
                    </div>
                    ${data.type === 'text' ? `
                        <div><label class="text-[9px] text-zinc-500 font-black uppercase">Texto</label><input type="text" id="in-text" value="${data.text}" oninput="updateData('text', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs text-blue-400 font-black uppercase"></div>
                    ` : ''}
                    <div>
                        <label class="text-[9px] text-zinc-500 font-black uppercase">Color del objeto</label>
                        <input type="color" value="${data.color}" oninput="updateData('color', this.value)" class="w-full h-8 bg-black border border-zinc-800 rounded cursor-pointer">
                    </div>
                    <button onclick="deleteElement()" class="w-full py-2 bg-red-900/10 hover:bg-red-900/20 text-red-500 rounded text-[10px] font-black border border-red-900/30 transition-all uppercase">Eliminar Objeto</button>
                </div>
            `;
        }

        function syncPropertiesInputs(data) {
            ['x', 'y', 'w', 'h', 'text'].forEach(k => {
                const input = document.getElementById('in-' + k);
                if (input && document.activeElement !== input) input.value = data[k];
            });
        }

        function updateData(key, val) {
            const win = windows.find(w => w.id === currentWindowId);
            const data = win.elements.find(e => e.id === selectedElementId);
            data[key] = (key === 'color' || key === 'text') ? val : parseInt(val || 0);
            applyElementStyles(document.getElementById(selectedElementId), data);
            syncPropertiesInputs(data);
            saveToStorage();
        }

        function deleteElement() {
            const win = windows.find(w => w.id === currentWindowId);
            win.elements = win.elements.filter(e => e.id !== selectedElementId);
            document.getElementById(selectedElementId).remove();
            selectedElementId = null;
            renderProperties();
            saveToStorage();
        }

        function updateWindowTitle(val) {
            const win = windows.find(w => w.id === currentWindowId);
            win.title = val.toUpperCase().replace(/\s+/g, '_');
            renderTabs();
            saveToStorage();
        }

        function exportCode() {
            const win = windows.find(w => w.id === currentWindowId);
            
            // Separamos elementos para que el texto siempre se dibuje al final del buecle
            const formas = win.elements.filter(e => e.type !== 'text');
            const textos = win.elements.filter(e => e.type === 'text');

            const full = `#include "raylib.h"

// --- EXPLICACIÓN DEL PROFESOR ---
// Recuerda: Raylib dibuja las cosas en el orden en que escribes el código.
// Si quieres que el texto esté "arriba", debes poner las funciones de texto
// siempre al final, justo antes de terminar de dibujar (EndDrawing).
// He organizado este código para que las formas vayan primero y los textos después.

int main() {
    // Definimos el tamaño de la ventana según lo que hiciste en el estudio
    InitWindow(${win.width}, ${win.height}, "Mi Juego - ${win.title}");
    SetTargetFPS(60);

    while (!WindowShouldClose()) {
        BeginDrawing();
            ClearBackground(BLACK); // Limpiamos la pantalla con negro
            
            // Primero dibujamos las formas (rectángulos, círculos, etc.)
            ${formas.map(e => {
                const color = `GetColor(0x${e.color.replace('#','') }FF)`;
                if(e.type === 'rect') return `DrawRectangle(${e.x}, ${e.y}, ${e.w}, ${e.h}, ${color});`;
                if(e.type === 'circle') return `DrawCircle(${e.x + e.w/2}, ${e.y + e.h/2}, ${e.w/2}, ${color});`;
                if(e.type === 'triangle') return `DrawTriangle((Vector2){${e.x + e.w/2}, ${e.y}}, (Vector2){${e.x}, ${e.y + e.h}}, (Vector2){${e.x + e.w}, ${e.y + e.h}}, ${color});`;
                return '';
            }).join('\n            ')}

            // Por último dibujamos los textos para que nada los tape
            ${textos.map(e => {
                const color = `GetColor(0x${e.color.replace('#','') }FF)`;
                return `DrawText("${e.text}", ${e.x}, ${e.y}, ${e.h}, ${color});`;
            }).join('\n            ')}

        EndDrawing();
    }

    CloseWindow();
    return 0;
}
`;
            document.getElementById('full-code-output').innerText = full;
            document.getElementById('export-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
