<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raylib Studio - Transformaciones Interactivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            background-color: #000;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .ray-element {
            position: absolute;
            cursor: move;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: 1px solid transparent;
        }
        .ray-element:hover { outline: 1px solid #555; }
        .ray-element.selected { outline: 1px solid #3b82f6 !important; z-index: 50; }
        
        .ray-text-container { 
            z-index: 100 !important; 
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            background-color: rgba(59, 130, 246, 0.15);
        }
        .ray-text-content {
            display: block;
            line-height: 1;
            font-family: monospace;
            white-space: nowrap;
            transform: scaleY(1.1);
        }

        .resizer {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border: 1px solid #3b82f6;
            border-radius: 2px;
            z-index: 60;
            display: none;
        }
        .selected .resizer { display: block; }
        .resizer-br { bottom: -5px; right: -5px; cursor: nwse-resize; }
        
        .line-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #3b82f6;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 70;
            cursor: crosshair;
            display: none;
        }
        .selected .line-handle { display: block; }

        .ray-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: white;
            background: #1a1a1a;
        }

        .ray-line-container {
            pointer-events: none;
            overflow: visible !important;
        }
        .line-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .line-hitbox {
            pointer-events: auto;
            cursor: move;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 bg-[#161616] border-b border-[#222] flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold text-white flex items-center gap-2">
                <span class="bg-blue-600 px-1.5 rounded text-sm">R</span> Studio Interact
            </h1>
            <div id="project-tabs" class="flex h-full items-center overflow-x-auto gap-1"></div>
            <button onclick="createNewWindow()" class="p-1.5 hover:bg-zinc-800 rounded text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>

        <div class="flex gap-2 bg-zinc-900 p-1 rounded-md border border-zinc-800">
            <button onclick="addElement('text')" class="px-3 py-1 hover:bg-zinc-800 rounded text-xs font-bold text-blue-400">TEXTO</button>
            <button onclick="addElement('rect')" class="px-3 py-1 hover:bg-zinc-800 rounded text-xs font-bold text-orange-400">RECT</button>
            <button onclick="addElement('circle')" class="px-3 py-1 hover:bg-zinc-800 rounded text-xs font-bold text-purple-400">CIRCL</button>
            <button onclick="addElement('triangle')" class="px-3 py-1 hover:bg-zinc-800 rounded text-xs font-bold text-emerald-400">TRIANG</button>
            <button onclick="addElement('line')" class="px-3 py-1 hover:bg-zinc-800 rounded text-xs font-bold text-yellow-400 underline decoration-2">LINEA</button>
        </div>

        <div class="flex gap-2">
            <button onclick="resetStorage()" class="px-4 py-1.5 bg-red-900/20 hover:bg-red-900/40 text-red-500 rounded text-xs font-bold">LIMPIAR</button>
            <button onclick="exportCode()" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 rounded text-xs font-bold">EXPORTAR C++</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <div id="editor-view" class="flex-1 overflow-auto p-12 flex items-center justify-center bg-[#0a0a0a]" onclick="handleCanvasClick(event)">
            <div id="canvas-container"></div>
        </div>

        <aside class="w-80 bg-[#161616] border-l border-[#222] flex flex-col">
            <div class="p-4 border-b border-[#222]">
                <h2 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Escena Actual</h2>
                <input type="text" id="win-title" oninput="updateWindowTitle(this.value)" class="w-full bg-black border border-zinc-800 rounded px-2 py-1.5 text-sm text-blue-400 mb-2">
                <div class="flex gap-2">
                    <input type="number" id="screen-w" oninput="updateScreenSize()" class="bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs w-1/2">
                    <input type="number" id="screen-h" oninput="updateScreenSize()" class="bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs w-1/2">
                </div>
            </div>
            <div id="properties-content" class="p-4 flex-1 overflow-y-auto space-y-4"></div>
            <div class="p-4 border-t border-[#222] bg-[#111] text-[10px] text-zinc-500 flex items-center justify-between">
                <span>Persistencia: <span class="text-emerald-500">Activa</span></span>
                <span id="save-indicator" class="opacity-0 transition-opacity text-blue-400">Guardado</span>
            </div>
        </aside>
    </main>

    <div id="export-modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-[200] p-6">
        <div class="bg-[#111] border border-zinc-800 rounded-xl w-full max-w-4xl flex flex-col max-h-full">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
                <h3 class="font-bold text-white text-sm uppercase">Código C++ para Raylib</h3>
                <button onclick="document.getElementById('export-modal').style.display='none'" class="text-zinc-500 hover:text-white">&times;</button>
            </div>
            <pre id="full-code-output" class="p-6 overflow-auto text-[11px] font-mono text-emerald-400 bg-black flex-1"></pre>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'RAYLIB_STUDIO_INTERACT_V3';
        let windows = [{ id: 'win-1', title: 'ESCENA_1', width: 800, height: 450, elements: [] }];
        let currentWindowId = 'win-1';
        let selectedElementId = null;
        let isDragging = false;
        
        const canvas = document.getElementById('canvas-container');
        const RAYLIB_FONT_RATIO = 0.5;

        window.onload = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                windows = data.windows;
                currentWindowId = data.currentWindowId;
            }
            renderTabs();
            switchWindow(currentWindowId);
        };

        // Función vital para evitar deselecciones accidentales
        function handleCanvasClick(e) {
            // Si el clic ocurre directamente en el fondo oscuro o en el lienzo negro, deseleccionamos.
            // Pero si el clic viene de un hijo (un objeto), no hacemos nada aquí.
            if (e.target.id === 'editor-view' || e.target.id === 'canvas-container') {
                deselect();
            }
        }

        function resetStorage() {
            if(confirm("¿Estás seguro de que quieres borrar todo el proyecto?")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ windows, currentWindowId }));
            const ind = document.getElementById('save-indicator');
            if(ind) {
                ind.style.opacity = '1';
                setTimeout(() => ind.style.opacity = '0', 800);
            }
        }

        function switchWindow(id) {
            currentWindowId = id;
            selectedElementId = null;
            const win = windows.find(w => w.id === id);
            document.getElementById('win-title').value = win.title;
            document.getElementById('screen-w').value = win.width;
            document.getElementById('screen-h').value = win.height;
            canvas.style.width = win.width + 'px';
            canvas.style.height = win.height + 'px';
            
            canvas.innerHTML = ''; // Limpiamos el lienzo
            win.elements.forEach(data => drawElement(data));
            renderTabs();
            renderProperties();
            save();
        }

        function renderTabs() {
            document.getElementById('project-tabs').innerHTML = windows.map(w => `
                <div onclick="switchWindow('${w.id}')" class="px-4 py-4 text-xs font-bold cursor-pointer ${w.id === currentWindowId ? 'tab-active' : 'text-zinc-500'}">
                    ${w.title}
                </div>
            `).join('');
        }

        function calculateTextWidth(text, fontSize) {
            return Math.floor(text.length * (fontSize * RAYLIB_FONT_RATIO));
        }

        function addElement(type) {
            const win = windows.find(w => w.id === currentWindowId);
            const data = {
                id: 'el-' + Date.now(),
                type,
                x: 100, y: 100,
                x2: 250, y2: 100, 
                w: type === 'text' ? calculateTextWidth("HOLA_RAYLIB", 30) : 100,
                h: type === 'text' ? 30 : 100,
                color: type === 'line' ? '#ffff00' : (type === 'text' ? '#3b82f6' : '#ffffff'),
                text: "HOLA_RAYLIB"
            };
            win.elements.push(data);
            drawElement(data);
            select(data.id);
            save();
        }

        function drawElement(data) {
            const el = document.createElement('div');
            el.id = data.id;
            el.className = 'ray-element';
            if (data.type === 'line') el.classList.add('ray-line-container');
            if (data.type === 'triangle') el.classList.add('ray-triangle');
            if (data.type === 'text') el.classList.add('ray-text-container');
            
            el.addEventListener('mousedown', (e) => {
                // Detenemos la propagación para que el lienzo no detecte el clic y deseleccione
                e.stopPropagation();
                select(data.id);
                startDrag(e, data);
            });

            canvas.appendChild(el);
            applyStyles(el, data);
        }

        function applyStyles(el, data) {
            if (!el) return;
            el.innerHTML = ''; // Limpiamos para redibujar manejadores

            if (data.type === 'line') {
                el.style.left = '0px'; el.style.top = '0px';
                el.style.width = '100%'; el.style.height = '100%';
                
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute('class', 'line-svg');
                svg.innerHTML = `
                    <line x1="${data.x}" y1="${data.y}" x2="${data.x2}" y2="${data.y2}" stroke="${data.color}" stroke-width="2" />
                    <line x1="${data.x}" y1="${data.y}" x2="${data.x2}" y2="${data.y2}" stroke="transparent" stroke-width="20" class="line-hitbox" />
                `;
                el.appendChild(svg);

                // Manejadores de línea manuales
                const h1 = createHandle(data.x, data.y, (mx, my) => { data.x = mx; data.y = my; });
                const h2 = createHandle(data.x2, data.y2, (mx, my) => { data.x2 = mx; data.y2 = my; });
                el.appendChild(h1);
                el.appendChild(h2);
                return;
            }

            if (data.type === 'text') {
                data.w = calculateTextWidth(data.text, data.h);
                const span = document.createElement('span');
                span.className = 'ray-text-content';
                span.style.fontSize = data.h + 'px';
                span.innerText = data.text;
                el.appendChild(span);
            }

            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
            el.style.width = data.w + 'px';
            el.style.height = data.h + 'px';
            el.style.backgroundColor = data.type === 'text' ? 'rgba(59, 130, 246, 0.15)' : data.color;
            el.style.color = data.color;
            el.style.borderRadius = data.type === 'circle' ? '50%' : '0';

            // Añadir resizer para formas normales
            const resizer = document.createElement('div');
            resizer.className = 'resizer resizer-br';
            resizer.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                startResize(e, data);
            });
            el.appendChild(resizer);
        }

        function createHandle(x, y, onMove) {
            const h = document.createElement('div');
            h.className = 'line-handle';
            h.style.left = x + 'px';
            h.style.top = y + 'px';
            h.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                const move = (me) => {
                    const rect = canvas.getBoundingClientRect();
                    onMove(Math.round(me.clientX - rect.left), Math.round(me.clientY - rect.top));
                    applyStyles(document.getElementById(selectedElementId), findElementData(selectedElementId));
                    syncUI();
                };
                const up = () => { save(); window.removeEventListener('mousemove', move); };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
            });
            return h;
        }

        window.findElementData = (id) => {
            const win = windows.find(w => w.id === currentWindowId);
            return win.elements.find(e => e.id === id);
        };

        function startDrag(e, data) {
            const startX = e.clientX, startY = e.clientY;
            const initX = data.x, initY = data.y;
            const initX2 = data.x2, initY2 = data.y2;

            const move = (me) => {
                const dx = me.clientX - startX, dy = me.clientY - startY;
                data.x = Math.round(initX + dx);
                data.y = Math.round(initY + dy);
                if (data.type === 'line') {
                    data.x2 = Math.round(initX2 + dx);
                    data.y2 = Math.round(initY2 + dy);
                }
                applyStyles(document.getElementById(data.id), data);
                syncUI();
            };
            const up = () => { save(); window.removeEventListener('mousemove', move); };
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', up);
        }

        function startResize(e, data) {
            const startX = e.clientX, startY = e.clientY;
            const initW = data.w, initH = data.h;
            const move = (me) => {
                const dx = me.clientX - startX, dy = me.clientY - startY;
                data.w = Math.max(10, Math.round(initW + dx));
                data.h = Math.max(10, Math.round(initH + dy));
                applyStyles(document.getElementById(data.id), data);
                syncUI();
            };
            const up = () => { save(); window.removeEventListener('mousemove', move); };
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', up);
        }

        function select(id) {
            if (selectedElementId === id) return;
            deselect();
            selectedElementId = id;
            const el = document.getElementById(id);
            if (el) el.classList.add('selected');
            renderProperties();
        }

        function deselect() {
            if (selectedElementId) {
                const el = document.getElementById(selectedElementId);
                if (el) el.classList.remove('selected');
            }
            selectedElementId = null;
            renderProperties();
        }

        function renderProperties() {
            const container = document.getElementById('properties-content');
            const win = windows.find(w => w.id === currentWindowId);
            const data = win.elements.find(e => e.id === selectedElementId);
            if (!data) { container.innerHTML = '<p class="text-zinc-600 text-xs italic text-center py-8">Selecciona un objeto para editar</p>'; return; }

            container.innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[9px] text-zinc-500 font-bold uppercase">X1 / Pos X</label><input type="number" id="p-x" value="${data.x}" oninput="update('x', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs"></div>
                        <div><label class="text-[9px] text-zinc-500 font-bold uppercase">Y1 / Pos Y</label><input type="number" id="p-y" value="${data.y}" oninput="update('y', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs"></div>
                        ${data.type === 'line' ? `
                            <div><label class="text-[9px] text-zinc-500 font-bold uppercase">X Final</label><input type="number" id="p-x2" value="${data.x2}" oninput="update('x2', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs"></div>
                            <div><label class="text-[9px] text-zinc-500 font-bold uppercase">Y Final</label><input type="number" id="p-y2" value="${data.y2}" oninput="update('y2', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs"></div>
                        ` : `
                            <div><label class="text-[9px] text-zinc-500 font-bold uppercase">Ancho</label><input type="number" id="p-w" value="${data.w}" oninput="update('w', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs" ${data.type==='text'?'disabled':''}></div>
                            <div><label class="text-[9px] text-zinc-500 font-bold uppercase">Alto / Font</label><input type="number" id="p-h" value="${data.h}" oninput="update('h', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs"></div>
                        `}
                    </div>
                    ${data.type === 'text' ? `<div><label class="text-[9px] text-zinc-500 font-bold uppercase">Texto</label><input type="text" value="${data.text}" oninput="update('text', this.value)" class="w-full bg-black border border-zinc-800 rounded p-1 text-xs text-blue-400 uppercase"></div>` : ''}
                    <div><label class="text-[9px] text-zinc-500 font-bold uppercase">Color</label><input type="color" value="${data.color}" oninput="update('color', this.value)" class="w-full h-8 bg-black border border-zinc-800 rounded cursor-pointer"></div>
                    <button onclick="deleteEl()" class="w-full py-2 bg-red-900/10 text-red-500 text-[10px] font-bold border border-red-900/30 rounded uppercase">Eliminar</button>
                </div>
            `;
        }

        function update(k, v) {
            const win = windows.find(w => w.id === currentWindowId);
            const data = win.elements.find(e => e.id === selectedElementId);
            if(!data) return;
            data[k] = (k === 'color' || k === 'text') ? v : parseInt(v || 0);
            applyStyles(document.getElementById(data.id), data);
            save();
        }

        function deleteEl() {
            const win = windows.find(w => w.id === currentWindowId);
            win.elements = win.elements.filter(e => e.id !== selectedElementId);
            const el = document.getElementById(selectedElementId);
            if(el) el.remove();
            deselect();
            save();
        }

        function syncUI() {
            const win = windows.find(w => w.id === currentWindowId);
            const data = win.elements.find(e => e.id === selectedElementId);
            if (!data) return;
            ['x', 'y', 'x2', 'y2', 'w', 'h'].forEach(k => {
                const inp = document.getElementById('p-' + k);
                if (inp) inp.value = data[k];
            });
        }

        function updateScreenSize() {
            const win = windows.find(w => w.id === currentWindowId);
            win.width = parseInt(document.getElementById('screen-w').value) || 800;
            win.height = parseInt(document.getElementById('screen-h').value) || 450;
            canvas.style.width = win.width + 'px';
            canvas.style.height = win.height + 'px';
            save();
        }

        function updateWindowTitle(val) {
            const win = windows.find(w => w.id === currentWindowId);
            win.title = val.toUpperCase().replace(/\s+/g, '_');
            renderTabs();
            save();
        }

        function exportCode() {
            const win = windows.find(w => w.id === currentWindowId);
            const formas = win.elements.filter(e => e.type !== 'text');
            const textos = win.elements.filter(e => e.type === 'text');

            const full = `#include "raylib.h"

// --- COMENTARIOS DEL PROFESOR ---
// Recuerda que el orden de dibujo es fundamental.
// Lo que se dibuja primero queda al fondo.
// No olvides llamar a CloseWindow al final para liberar memoria.

int main() {
    InitWindow(${win.width}, ${win.height}, "Raylib Studio - ${win.title}");
    SetTargetFPS(60);

    while (!WindowShouldClose()) {
        BeginDrawing();
            ClearBackground(BLACK); // Pintamos el fondo de negro
            
            // Dibujamos las figuras geometricas
            ${formas.map(e => {
                const color = `GetColor(0x${e.color.replace('#','') }FF)`;
                if(e.type === 'rect') return `DrawRectangle(${e.x}, ${e.y}, ${e.w}, ${e.h}, ${color});`;
                if(e.type === 'circle') return `DrawCircle(${e.x + e.w/2}, ${e.y + e.h/2}, ${e.w/2}, ${color});`;
                if(e.type === 'triangle') return `DrawTriangle((Vector2){${e.x + e.w/2}, ${e.y}}, (Vector2){${e.x}, ${e.y + e.h}}, (Vector2){${e.x + e.w}, ${e.y + e.h}}, ${color});`;
                if(e.type === 'line') return `DrawLine(${e.x}, ${e.y}, ${e.x2}, ${e.y2}, ${color});`;
                return '';
            }).join('\n            ')}

            // Dibujamos los textos por encima para que sean legibles
            ${textos.map(e => {
                const color = `GetColor(0x${e.color.replace('#','') }FF)`;
                return `DrawText("${e.text}", ${e.x}, ${e.y}, ${e.h}, ${color});`;
            }).join('\n            ')}

        EndDrawing();
    }

    CloseWindow(); // Cerramos la ventana de forma limpia
    return 0;
}
`;
            document.getElementById('full-code-output').innerText = full;
            document.getElementById('export-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
